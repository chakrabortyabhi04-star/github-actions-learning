name: "Day 7 - Secrets and Variables"

on:
  workflow_dispatch:

jobs:
  use-data:
    runs-on: ubuntu-latest
    steps:
      - name: Use Database Password
        env:
          # Passwords belong in the 'secrets' safe
          MY_PASSWORD: ${{ secrets.DB_PASSWORD }} 
        run: |
          echo "Connecting to database..."
          
          echo "Password is: $MY_PASSWORD"

      - name: Use API Key/URL
        env:
          # Non-sensitive config belongs in 'vars'
          MY_API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Calling API..."
         
          echo "API Key is: $MY_API_KEY"