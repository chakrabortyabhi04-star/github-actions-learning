name: Day 24 - Environments and Approvals

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-learning:day24 .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/github-actions-learning:day24

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    steps:
      - name: Deploy to dev
        run: echo "Deploying to dev server"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deploying to staging server"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - name: Deploy to prod
        run: echo "Deploying to prod server"