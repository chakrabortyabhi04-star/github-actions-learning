name: Day 17 - Status Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main      

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flake8
        run: pip install flake8
      - name: Run lint
        run: flake8 hello.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest    

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build artifact
        run: zip app.zip app.py